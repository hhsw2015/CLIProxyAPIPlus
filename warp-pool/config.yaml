# WARP Proxy Pool Configuration

# Number of WARP instances to run (each will have unique IPv4)
pool_size: 3

# WARP binary path
warp_bin: "./warp"

# Base directory for WARP data
data_dir: "./data"

# Port ranges for internal WARP instances
socks_base_port: 10001
http_base_port: 11001

# External proxy ports (the unified entry point)
proxy:
  socks_port: 1080
  http_port: 8118
  include_direct: true
  # Routing weights: higher = more traffic routed to this type
  weight_ech: 3     # ECH Workers (dynamic IP, highest priority)
  weight_warp: 2    # WARP instances (fixed IP)
  weight_direct: 1  # VPS direct IP (lowest priority)  # Include VPS direct IP in round-robin

# ECH Workers - Cloudflare Workers proxy with rotating IPs
# Each worker runs on a different Cloudflare account/domain = different exit IP
# warp-pool manages their lifecycle automatically
ech_workers:
  enabled: true
  bin_path: "./ech-workers"
  workers:
    - name: ech-1
      domain: "ech.playingapi.tech:443"
      ip: "104.17.0.134"
      token: "7bd57098-82bd-4dfa-b32c-9943a52d354f"
      port: 30001
    # Add more workers on different Cloudflare accounts for more IPs:
    # - name: ech-2
    #   domain: "ech2.example.com:443"
    #   token: "another-token"
    #   port: 30002

# Management API
api:
  port: 9090
  token: ""

# Health check interval in seconds
health_check_interval: 30

# License key list URL (for WARP+ upgrade)
license_key_url: "http://warp-tool.vercel.app/api/full"

# Unique IPv4 mode
# When enabled, startup will ensure each instance has a unique IPv4
# by restarting instances until all have different IPs
unique_ipv4:
  enabled: true
  max_retries: 30
  retry_delay: 5

# Auto rotation settings - disabled for stable pool
rotation:
  enabled: false
  requests_threshold: 0
  min_interval: 60
  only_used: true

# Resource limits per warp instance
# Keeps 3 instances within ~1.5G total instead of unbounded growth
resource_limits:
  memory_mb: 512    # GOMEMLIMIT per instance (MiB)
  max_procs: 1      # GOMAXPROCS per instance (2-core VPS / 3 instances)
  log_level: "warn" # reduce log I/O

# Direct connection mode
direct:
  enabled: true
  expose_external: true

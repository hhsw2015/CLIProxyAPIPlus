# Management API
api:
  port: 9090
  token: ""

# Health check interval in seconds
health_check_interval: 30

# License key list URL (for WARP+ upgrade)
license_key_url: "http://warp-tool.vercel.app/api/full"

# Unique IPv4 mode
# When enabled, startup will ensure each instance has a unique IPv4
# by restarting instances until all have different IPs
unique_ipv4:
  enabled: true
  max_retries: 30
  retry_delay: 5

# Auto rotation settings - disabled for stable pool
rotation:
  enabled: false
  requests_threshold: 0
  min_interval: 60
  only_used: true

# Resource limits per warp instance
# Keeps 3 instances within ~1.5G total instead of unbounded growth
resource_limits:
  memory_mb: 512    # GOMEMLIMIT per instance (MiB)
  max_procs: 1      # GOMAXPROCS per instance (2-core VPS / 3 instances)
  log_level: "warn" # reduce log I/O

# Direct connection mode
direct:
  enabled: true
  expose_external: true
